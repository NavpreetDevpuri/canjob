# runs end-to-end on CPU, and produces a ranked CSV within the compute budget.

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"
# Single command that produces submission.csv. CPU-only, offline, < 5 min for 100k.
# Pre-computation (embeddings) is done separately by precompute.py and its small
# output artifact is committed, so this command needs no torch and no network.

# ============================================================================
# Compute environment
# ============================================================================
